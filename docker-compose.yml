version: '3.8'

services:
  # MongoDB
  mongodb:
    image: mongo:7
    container_name: taskflow-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: taskflow
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - taskflow-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/taskflow
      JWT_SECRET: your_super_secret_jwt_key_change_this
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - taskflow-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - taskflow-network

volumes:
  mongo_data:

networks:
  taskflow-network:
    driver: bridge
